name: Feature request
description: Suggest an improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Share your idea. The more context you provide, the easier it is to evaluate and implement.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem does this address?
      placeholder: As a user, I want ... so that ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your suggested approach.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative ideas or workarounds?

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What should be true for this to be done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, references, etc.
